version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fastpay_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fastpay
      POSTGRES_USER: fastpay_user
      POSTGRES_PASSWORD: fastpay_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fastpay_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
